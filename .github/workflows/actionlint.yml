name: Actionlint

on:
  pull_request:
    paths:
      - '.github/workflows/*'

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check workflow syntax
        uses: rhysd/actionlint-docker@v3
