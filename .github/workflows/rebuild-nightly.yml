name: Nightly Rebuild

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  QUAY_REGISTRY: quay.io

permissions:
  contents: read
  packages: write

jobs:
  check:
    name: Check base images
    runs-on: ubuntu-latest
    outputs:
      needs-updating: ${{ steps.check.outputs.needs-updating }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Quay.io
        if: vars.QUAY_USERNAME != '' && secrets.QUAY_TOKEN != ''
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.QUAY_REGISTRY }}
          username: ${{ vars.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}

      - name: Check if base images changed
        id: check
        uses: lucacome/docker-image-update-checker@3233adf42bb1dddf92f18cf024a8e202dbeaa9b3 # v3.1.0
        with:
          base-image: ghcr.io/home-assistant/amd64-base:3.19
          image: ${{ env.REGISTRY }}/${{ github.repository_owner }}/vevor-weatherbridge-go-amd64:latest
          platforms: linux/amd64

  rebuild:
    name: Rebuild all architectures
    needs: [check]
    if: needs.check.outputs.needs-updating == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, armv7, aarch64, armhf, i386]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version:' vevor-weatherbridge-go/config.yaml | awk '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Quay.io
        if: vars.QUAY_USERNAME != '' && secrets.QUAY_TOKEN != ''
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.QUAY_REGISTRY }}
          username: ${{ vars.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}

      - name: Map architecture
        id: arch
        run: |
          case "${{ matrix.arch }}" in
            amd64)   echo "platform=linux/amd64" >> $GITHUB_OUTPUT ;;
            armv7)   echo "platform=linux/arm/v7" >> $GITHUB_OUTPUT ;;
            aarch64) echo "platform=linux/arm64" >> $GITHUB_OUTPUT ;;
            armhf)   echo "platform=linux/arm/v6" >> $GITHUB_OUTPUT ;;
            i386)    echo "platform=linux/386" >> $GITHUB_OUTPUT ;;
          esac

      - name: Map HA base image
        id: base
        run: |
          case "${{ matrix.arch }}" in
            amd64)   echo "image=ghcr.io/home-assistant/amd64-base:3.19" >> $GITHUB_OUTPUT ;;
            armv7)   echo "image=ghcr.io/home-assistant/armv7-base:3.19" >> $GITHUB_OUTPUT ;;
            aarch64) echo "image=ghcr.io/home-assistant/aarch64-base:3.19" >> $GITHUB_OUTPUT ;;
            armhf)   echo "image=ghcr.io/home-assistant/armhf-base:3.19" >> $GITHUB_OUTPUT ;;
            i386)    echo "image=ghcr.io/home-assistant/i386-base:3.19" >> $GITHUB_OUTPUT ;;
          esac

      - name: Build and push to GHCR
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: ./vevor-weatherbridge-go
          platforms: ${{ steps.arch.outputs.platform }}
          pull: true
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/vevor-weatherbridge-go-${{ matrix.arch }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/vevor-weatherbridge-go-${{ matrix.arch }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          build-args: |
            BUILD_FROM=${{ steps.base.outputs.image }}
            VERSION=${{ steps.version.outputs.version }}

      - name: Push to Quay.io
        if: vars.QUAY_USERNAME != '' && secrets.QUAY_TOKEN != ''
        run: |
          docker buildx build \
            --context ./vevor-weatherbridge-go \
            --platform ${{ steps.arch.outputs.platform }} \
            --pull --no-cache \
            --push \
            --tag ${{ env.QUAY_REGISTRY }}/${{ vars.QUAY_USERNAME }}/vevor-weatherbridge-go-${{ matrix.arch }}:${{ steps.version.outputs.version }} \
            --tag ${{ env.QUAY_REGISTRY }}/${{ vars.QUAY_USERNAME }}/vevor-weatherbridge-go-${{ matrix.arch }}:latest \
            --build-arg BUILD_FROM=${{ steps.base.outputs.image }} \
            --build-arg VERSION=${{ steps.version.outputs.version }} \
            .
