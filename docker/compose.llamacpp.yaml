services:
  # ── Chat/Completion ──
  llamacpp-chat:
    image: ghcr.io/ggml-org/llama.cpp:server-vulkan
    container_name: llamacpp-chat
    expose:
      - "8081"
    volumes:
      - /mnt/llama-docker/models:/models
    devices:
      - /dev/dri:/dev/dri
      - /dev/kfd:/dev/kfd
    command: >
      --hf-repo Qwen/Qwen3-8B-GGUF:Q4_K_M
      --port 8081 -c 8192 -ngl 99
      --flash-attn on
    restart: unless-stopped

  # ── Embeddings ──
  llamacpp-embed:
    image: ghcr.io/ggml-org/llama.cpp:server-vulkan
    container_name: llamacpp-embed
    expose:
      - "8082"
    volumes:
      - /mnt/llama-docker/models:/models
    command: >
      --hf-repo nomic-ai/nomic-embed-text-v2-moe-GGUF
      --hf-file nomic-embed-text-v2-moe.Q4_K_M.gguf
      --embedding --pooling mean
      --port 8082 -c 8192
    restart: unless-stopped

  # ── Reverse Proxy (router) ──
  llama-swap:
    image: ghcr.io/mostlygeek/llama-swap:rocm
    container_name: llama-swap
    devices:
      - /dev/dri:/dev/dri
      - /dev/kfd:/dev/kfd
    ports:
      - "8080:8080"
    volumes:
      - ./docker/config/llama-swap.yaml:/app/config.yaml:ro
      - /mnt/llama-docker/llama-swap:/data
    command: -config /app/config.yaml -watch-config
    restart: unless-stopped

  # ── Agentmemory ──
  agentmemory:
    image: node:22-alpine
    container_name: agentmemory
    depends_on:
      - llama-swap
    ports:
      - "3111:3111"
      - "3113:3113"
    volumes:
      - /mnt/llama-docker/agentmemory:/data
    environment:
      - EMBEDDING_PROVIDER=openai
      - OPENAI_BASE_URL=http://llama-swap:8080/v1
      - OPENAI_API_KEY=not-needed
      - OPENAI_MODEL=qwen3-8b-Q4_K_M
      - AGENTMEMORY_EMBEDDING_MODEL=nomic-embed-text-v2-moe
      - AUTO_COMPRESS=true
      - CONSOLIDATION_ENABLED=true
      - GRAPH_EXTRACTION_ENABLED=true
    working_dir: /data
    command: sh -c "npx @agentmemory/agentmemory"
    restart: unless-stopped

  # ── Optional: llama.cpp Studio (GUI model manager) ──
